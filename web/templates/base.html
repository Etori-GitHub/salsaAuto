<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}salsaAuto{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    {% block head %}{% endblock %}
</head>
<body>
    <div class="app-container">
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-brand">
                    <div class="brand-logo">S</div>
                    <div class="brand-text">
                        <span class="brand-title">salsaAuto</span>
                        <span class="brand-subtitle">v2.3</span>
                    </div>
                </div>
                <button class="sidebar-toggle" onclick="toggleSidebar()">
                    <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
                </button>
            </div>
            <div class="nav-content">
                <div class="nav-group">
                    <div class="nav-group-header"><span class="nav-group-title">概览</span></div>
                    <ul class="nav-items">
                        <li><a href="/" class="nav-item {% if page == 'index' %}active{% endif %}"><svg class="nav-icon" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg><span class="nav-label">概览</span></a></li>
                    </ul>
                </div>
                <div class="nav-group">
                    <div class="nav-group-header"><span class="nav-group-title">档案</span></div>
                    <ul class="nav-items">
                        <li><a href="/stores" class="nav-item {% if page == 'stores' %}active{% endif %}"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg><span class="nav-label">门店管理</span></a></li>
                        <li><a href="/dishes" class="nav-item {% if page == 'dishes' %}active{% endif %}"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/></svg><span class="nav-label">菜品管理</span></a></li>
                        <li><a href="/members" class="nav-item {% if page == 'members' %}active{% endif %}"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg><span class="nav-label">会员管理</span></a></li>
                        <li><a href="/goods" class="nav-item {% if page == 'goods' %}active{% endif %}"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg><span class="nav-label">商品库</span></a></li>
                        <li><a href="/goods-sub-cate" class="nav-item {% if page == 'goods-sub-cate' %}active{% endif %}"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg><span class="nav-label">商品分类</span></a></li>
                        <li><a href="/cang-sub-cate" class="nav-item {% if page == 'cang-sub-cate' %}active{% endif %}"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg><span class="nav-label">档口分类</span></a></li>
                    </ul>
                </div>
                <div class="nav-group">
                    <div class="nav-group-header"><span class="nav-group-title">刷单</span></div>
                    <ul class="nav-items">
                        <li><a href="/calculator" class="nav-item {% if page == 'calculator' %}active{% endif %}"><svg class="nav-icon" viewBox="0 0 24 24"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="12" y2="14"/><line x1="8" y1="18" x2="12" y2="18"/></svg><span class="nav-label">发布任务</span></a></li>
                        <li><a href="/orders" class="nav-item {% if page == 'orders' %}active{% endif %}"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/></svg><span class="nav-label">刷单</span></a></li>
                        <li><a href="/records" class="nav-item {% if page == 'records' %}active{% endif %}"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M12 8v4l3 3"/><circle cx="12" cy="12" r="10"/></svg><span class="nav-label">刷单记录</span></a></li>
                    </ul>
                </div>
                <div class="nav-group">
                    <div class="nav-group-header"><span class="nav-group-title">数据分析</span></div>
                    <ul class="nav-items">
                        <li><a href="/order-query" class="nav-item {% if page == 'order-query' %}active{% endif %}"><svg class="nav-icon" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg><span class="nav-label">订单查询</span></a></li>
                        <li><a href="/product-analysis" class="nav-item {% if page == 'product-analysis' %}active{% endif %}"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M18 20V10"/><path d="M12 20V4"/><path d="M6 20v-6"/></svg><span class="nav-label">菜品分析</span></a></li>
                        <li><a href="/category-analysis" class="nav-item {% if page == 'category-analysis' %}active{% endif %}"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg><span class="nav-label">档口分析</span></a></li>
                        <li><a href="/supply-query" class="nav-item {% if page == 'supply-query' %}active{% endif %}"><svg class="nav-icon" viewBox="0 0 24 24"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg><span class="nav-label">要货查询</span></a></li>
                        <li><a href="/monthly-order" class="nav-item {% if page == 'monthly-order' %}active{% endif %}"><svg class="nav-icon" viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><span class="nav-label">月订货统计</span></a></li>
                    </ul>
                </div>
                
            </div>
        </nav>

        <main class="main-content">
            <header class="content-header">
                <h1>{% block header %}{% endblock %}</h1>
            </header>

            <div class="content-body">
                {% block content %}{% endblock %}
            </div>
        </main>
    </div>

    <script src="/static/app.js"></script>
    <script>
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('collapsed');
    }

    // Toast 通知系统
    function showToast(message, type = 'success', duration = 10000) {
        let container = document.getElementById('toast-container');
        if (!container) {
            container = document.createElement('div');
            container.id = 'toast-container';
            container.className = 'toast-container';
            document.body.appendChild(container);
        }

        const icons = {
            success: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>',
            error: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>',
            warning: '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>'
        };

        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = `
            ${icons[type] || icons.success}
            <span style="flex:1">${message}</span>
            <button class="toast-close" onclick="this.parentElement.classList.add('hiding');setTimeout(()=>this.parentElement.remove(),300)">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
        `;

        container.appendChild(toast);

        setTimeout(() => {
            if (toast.parentElement) {
                toast.classList.add('hiding');
                setTimeout(() => toast.remove(), 300);
            }
        }, duration);
    }
    {% block script %}{% endblock %}
    </script>
</body>
</html>
